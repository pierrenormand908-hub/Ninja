<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Façade Ninja</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="Ninja-1.png">
  <style>
    body { background: #111; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; font-family: system-ui, sans-serif; flex-direction: column; }
    
    .ninja-top { width: 100%; max-width: 380px; margin: 0 auto; height: 380px; background: #050505; border-radius: 5px; box-shadow: 0 10px 30px #000; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; position: relative; }
    
    .ninja-logo { width: 100%; text-align: center; font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 0.25em; text-transform: uppercase; margin: 8px 0 -4px 0; background: linear-gradient(135deg, #f5f5f5 0%, #b0b0b0 30%, #666 60%, #fff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 4px rgba(255,255,255,0.4), 0 0 10px rgba(0,0,0,0.8), 1px 1px 0 rgba(0,0,0,0.7); position: relative; }
    
    .ninja-frame { height: 190px; margin: 14px 14px 10px 14px; border-radius: 10px; background: linear-gradient(135deg, #1b1b1b, #050505); border: 1px solid #444; display: flex; padding: 10px 14px; box-sizing: border-box; flex-shrink: 0; }
    
    .ninja-display { flex: 1; border-radius: 8px; background: radial-gradient(circle at 50% 0%, #333 0%, #050505 40%, #000 100%); border: 1px solid #222; padding: 10px 12px; box-sizing: border-box; color: #cfcfcf; display: flex; flex-direction: column; justify-content: space-between; }
    
    .display-content-wrapper { display: flex; justify-content: space-between; height: 100%; width: 100%; }
    
    .display-left-column { display: flex; flex-direction: column; height: 100%; width: 30%; }
    .display-center-column { display: flex; flex-direction: column; align-items: center; height: 100%; width: 35%; text-align: center; }
    .display-right-column { display: flex; flex-direction: column; height: 100%; width: 35%; align-items: flex-end; }
    
    .zone-title { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #999; font-weight: bold; }

    .zone-mode { font-size: 8px; letter-spacing: 0.04em; text-transform: uppercase; color: #ffcf7a; font-weight: 600; min-height: 10px; line-height: 1.15; margin-top: 1px; word-break: break-word; transition: color 0.2s ease; }
    .display-right-column .zone-mode { text-align: right; }
    
    .zone-container-top { margin-top: 0; margin-bottom: auto; }
    .zone-container-bottom { margin-top: auto; margin-bottom: 0; }
    
    .temp-block { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .temp-block-vertical { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: auto; margin-bottom: auto; gap: 2px; }
    
    .temp-arrows { display: flex; flex-direction: column; gap: 6px; font-size: 18px; font-weight: bold; color: #444444; cursor: pointer; user-select: none; line-height: 1; padding: 2px 6px; transition: color 0.2s ease; }
    
    .single-arrow { font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; padding: 4px 10px; transition: transform 0.1s; }
    .single-arrow:active, .temp-arrows span:active, .time-arrows span:active { transform: scale(1.3); color: #fff; }

    .display-temp { font-size: 22px; font-weight: 600; color: #444444; line-height: 1; display: flex; align-items: baseline; transition: color 0.2s ease; }
    .display-temp span.unit { font-size: 12px; margin-left: 1px; color: inherit; }
    
    .time-block { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .time-arrows { display: flex; flex-direction: column; gap: 6px; font-size: 18px; font-weight: bold; color: #444444; cursor: pointer; user-select: none; line-height: 1; padding: 2px 6px; transition: color 0.2s ease; }
    .display-time { font-size: 22px; font-weight: 500; color: #444444; line-height: 1; transition: color 0.2s ease; }

    .ninja-cadre2 { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-bottom: 10px; }

    .ninja-pan-line, .ninja-pan-line-2 { width: 100%; max-width: 380px; margin: 15px auto 0 auto; height: 40px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; border-radius: 5px; }
    .ninja-pan-line { background: linear-gradient(to bottom, #202020 0%, #050505 60%, #000 100%); }
    .ninja-pan-line-2 { background: linear-gradient(to bottom, #1a1a1a 0%, #050505 60%, #000 100%); margin-top: 10px; }
    .section { flex: 1; text-align: center; color: #ccc; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: color 0.2s; user-select: none; }
    .section.active { color: #ff9f3a; }
    
    .recette-display { color: #ccc; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; }
    .arrow { font-size: 18px; color: #ccc; cursor: pointer; transition: transform 0.2s; }
    .arrow.open { transform: rotate(180deg); }
    .ninja-pan-line-3 { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 380px; height: 200px; background: linear-gradient(to bottom, #2a2a2a 0%, #0a0a0a 60%, #000 100%); border: 1px solid #333; border-radius: 5px; padding: 12px 18px; box-sizing: border-box; display: none; overflow-y: auto; overflow-x: hidden; z-index: 999; }
    #recipeList { max-height: 100%; margin: 0; padding-left: 15px; color: white; }
    .selected-recipe { background: #004aad; color: #fff; padding: 3px 6px; border-radius: 4px; }
    .action-buttons { width: 100%; max-width: 380px; margin: 12px auto 0 auto; display: flex; justify-content: center; gap: 15px; }
    .save-btn, .delete-btn { width: 140px; height: 36px; box-sizing: border-box; padding: 0; margin: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; font-size: 13px; font-family: inherit; line-height: normal; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 5px; }
    .save-btn { background: #0f8f00; border: 1px solid #3aff3a; }
    .delete-btn { background: #b00000; border: 1px solid #ff3a3a; }
    .popup { width: 325px; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; padding: 15px; box-shadow: 0 0 20px #000; display: none; margin: 15px auto 0 auto; }
    .popup input { width: 100%; max-width: 315px; padding: 8px; box-sizing: border-box; background: #000; border: 1px solid #555; border-radius: 4px; color: #eee; margin-bottom: 12px; }
    .popup-buttons { display: flex; justify-content: space-between; gap: 10px; }
    #confirmSave, #cancelPopup { padding: 10px; border-radius: 4px; cursor: pointer; color: #fff; }
    #confirmSave { background: #0f8f00; border: 1px solid #3aff3a; }
    #cancelPopup { background: #444; border: 1px solid #666; }
    .ninja-round-button { width: 120px; height: 120px; background: repeating-radial-gradient(circle at 50% 50%, rgba(200,200,200,.2) 0%, rgba(200,200,200,.2) 2%, transparent 2%, transparent 3%, rgba(200,200,200,.2) 3%, transparent 3%), conic-gradient(white 0%, silver 10%, white 35%, silver 45%, white 60%, silver 70%, white 80%, silver 95%, white 100%); border-radius: 50%; box-shadow: 0 0px 20px #0005, 0 -0px 20px #fff2; outline: 1px solid #fff; outline-offset: -2px; cursor: pointer; transition: transform 0.4s ease-out; margin: 0 auto; flex: 0 0 auto; position: relative; }
    .ninja-round-button::before { content: ""; position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 4px; height: 25%; background: black; border-radius: 2px; pointer-events: none; }
    #recipeName { font-size: 16px !important; }
    #yesDelete, #noDelete { font-size: 18px; padding: 12px 22px; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; }
    #yesDelete { background: #1f9b1f; }
    #noDelete { background: #c62828; }
    .ninja-knob-zone { display: flex; justify-content: center; align-items: center; width: 100%; max-width: 380px; margin: 0 auto; position: relative; }
    .ninja-knob-left, .ninja-knob-right { display: flex; flex-direction: column; gap: 12px; width: 40%; }
    .knob-option { display: flex; align-items: center; justify-content: flex-start; cursor: pointer; }
    .ninja-knob-left .knob-option { justify-content: flex-end; }
    .knob-label { color: #ccc; font-size: 10px; font-weight: 600; letter-spacing: 1px; cursor: pointer; user-select: none; }
    .knob-label-block { display: flex; flex-direction: column; }
    .knob-led { width: 10px; height: 5%; min-height: 12px; background: #333; border-radius: 2px; transition: background 0.2s; }
    .knob-option.active .knob-led { background: white; }
    .ninja-knob-left { margin-right: 12px; }
    .ninja-knob-right { margin-left: 12px; }
    .ninja-knob-left .knob-led { margin-left: 6px; }
    .ninja-knob-right .knob-led { margin-right: 6px; }
  </style>
</head>
<body>

<div class="ninja-top">
  <div class="ninja-logo">NINJA</div>
  
  <div class="ninja-frame">
    <div class="ninja-display">
      <div class="display-content-wrapper">
        
        <div class="display-left-column">
          <div class="zone-container-top">
            <div class="zone-title">ZONE 2</div>
            <div class="zone-mode" id="mode-z2"></div>
            <div class="temp-block">
              <div class="display-temp" id="text-temp-z2"><span id="val-temp-z2">375</span><span class="unit">°F</span></div>
              <div class="temp-arrows"><span id="up-z2">▲</span><span id="down-z2">▼</span></div>
            </div>
          </div>
          <div class="zone-container-bottom">
            <div class="zone-title">ZONE 1</div>
            <div class="zone-mode" id="mode-z1"></div>
            <div class="temp-block">
              <div class="display-temp" id="text-temp-z1"><span id="val-temp-z1">375</span><span class="unit">°F</span></div>
              <div class="temp-arrows"><span id="up-z1">▲</span><span id="down-z1">▼</span></div>
            </div>
          </div>
        </div>
        
        <div class="display-center-column">
          <div class="zone-title">megazone™</div>
          <div class="temp-block-vertical">
            <div class="single-arrow" id="up-mega" style="color: #444;">▲</div>
            <div class="display-temp" id="text-temp-mega"><span id="val-temp-mega">375</span><span class="unit">°F</span></div>
            <div class="single-arrow" id="down-mega" style="color: #444;">▼</div>
          </div>
        </div>
        
        <div class="display-right-column">
          <div class="zone-container-top" style="text-align: right;">
            <div class="zone-title">TIME 2</div>
            <div class="time-block">
              <div class="time-arrows" id="arrows-time-z2"><span id="up-time-z2">▲</span><span id="down-time-z2">▼</span></div>
              <div class="display-time" id="text-time-z2"><span id="val-time-z2">20</span>:00</div>
            </div>
          </div>
          
          <div class="zone-container-bottom" style="text-align: right;">
            <div class="zone-title">TIME 1</div>
            <div class="time-block">
              <div class="time-arrows" id="arrows-time-z1"><span id="up-time-z1">▲</span><span id="down-time-z1">▼</span></div>
              <div class="display-time" id="text-time-z1"><span id="val-time-z1">20</span>:00</div>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
  
  <div class="ninja-cadre2">
    <div class="ninja-knob-zone">
      <div class="ninja-knob-left">
        <div class="knob-option" data-angle="-55"><span class="knob-label">AIR FRY</span><div class="knob-led"></div></div>
        <div class="knob-option" data-angle="-75"><span class="knob-label">ROTIR</span><div class="knob-led"></div></div>
        <div class="knob-option" data-angle="-100"><span class="knob-label">CUIRE</span><div class="knob-led"></div></div>
        <div class="knob-option" data-angle="-120"><span class="knob-label">LEVÉE</span><div class="knob-led"></div></div>
      </div>
      <div class="ninja-round-button" id="knobBtn"></div>
      <div class="ninja-knob-right">
        <div class="knob-option" data-angle="55"><div class="knob-led"></div><span class="knob-label">RÉCHAUFFER</span></div>
        <div class="knob-option" data-angle="75"><div class="knob-led"></div><span class="knob-label">DÉSHYDRATER</span></div>
        <div class="knob-option" data-angle="100"><div class="knob-led"></div><div class="knob-label-block"><span class="knob-label">MAINTENIR</span><span class="knob-label">AU CHAUD</span></div></div>
      </div>
    </div>
  </div>
</div>

<div class="ninja-pan-line">
  <div class="section" id="z1">ZONE 1</div>
  <div class="section" id="mega">MEGAZONE</div>
  <div class="section" id="z2">ZONE 2</div>
</div>

<div class="ninja-pan-line-3" id="rect3">
  <div style="color:#ccc; font-size:14px;">Liste des recettes :</div>
  <ul id="recipeList"></ul>
</div>

<div class="ninja-pan-line-2">
  <div class="recette-display">Aucune recette sélectionnée</div>
  <div class="arrow" id="arrow">▼</div>
</div>

<div class="action-buttons">
  <button class="save-btn" id="openPopup">Enregistrer</button>
  <button class="delete-btn" id="deleteRecipe">Supprimer</button>
</div>

<div class="popup" id="popup">
  <input type="text" id="recipeName" placeholder="Nom de la recette">
  <div class="popup-buttons"><button id="confirmSave">Enregistrer</button><button id="cancelPopup">Annuler</button></div>
</div>

<div class="popup" id="confirmDeletePopup" style="border-color:#700;">
  <div style="color:#fff; margin-bottom:12px; text-align:center;">Voulez-vous vraiment supprimer cette recette ?</div>
  <div class="popup-buttons"><button id="yesDelete">Oui</button><button id="noDelete">Non</button></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const disp = document.querySelector('.recette-display');

  let tempZ1 = 375, tempZ2 = 375, tempMega = 375;
  let timeZ1 = 20, timeZ2 = 20;

  // Mode (angle du bouton rotatif) mémorisé séparément pour chaque zone
  let modeZ1 = null;
  let modeZ2 = null;

  const MODE_LABELS = {
    '-55': 'AIR FRY',
    '-75': 'ROTIR',
    '-100': 'CUIRE',
    '-120': 'LEVÉE',
    '55': 'RÉCHAUFFER',
    '75': 'DÉSHYDRATER',
    '100': 'MAINTENIR AU CHAUD'
  };

  function updateModeLabels() {
    $('mode-z1').textContent = (modeZ1 !== null && modeZ1 !== undefined) ? (MODE_LABELS[modeZ1] || '') : '';
    $('mode-z2').textContent = (modeZ2 !== null && modeZ2 !== undefined) ? (MODE_LABELS[modeZ2] || '') : '';
  }

  function updateKnobDisplay() {
    const zone1Active = $('z1').classList.contains('active');
    const zone2Active = $('z2').classList.contains('active');
    const megaActive = $('mega').classList.contains('active');
    const knob = $('knobBtn');

    let angle = null;
    if (megaActive) angle = modeZ1;
    else if (zone1Active) angle = modeZ1;
    else if (zone2Active) angle = modeZ2;

    document.querySelectorAll('.knob-option').forEach(opt => opt.classList.remove('active'));
    if (angle !== null && angle !== undefined) {
      const match = [...document.querySelectorAll('.knob-option')].find(o => o.getAttribute('data-angle') === String(angle));
      if (match) match.classList.add('active');
      knob.style.transform = `rotate(${angle}deg)`;
    } else {
      knob.style.transform = 'rotate(0deg)';
    }
  }

  function updateZoneColors() {
    const zone1Active = $('z1').classList.contains('active');
    const zone2Active = $('z2').classList.contains('active');
    const megaActive = $('mega').classList.contains('active');

    const temp1 = $('text-temp-z1'), temp2 = $('text-temp-z2');
    const tempM = $('text-temp-mega'), arrowUpM = $('up-mega'), arrowDownM = $('down-mega');
    const textTime1 = $('text-time-z1'), arrowBoxT1 = $('arrows-time-z1');
    const textTime2 = $('text-time-z2'), arrowBoxT2 = $('arrows-time-z2');
    const arrowUpZ1 = $('up-z1'), arrowDownZ1 = $('down-z1');
    const arrowUpZ2 = $('up-z2'), arrowDownZ2 = $('down-z2');

    if (!zone1Active && !zone2Active && !megaActive) {
      temp1.style.color = '#444444'; temp2.style.color = '#444444';
      tempM.style.color = '#444444'; arrowUpM.style.color = '#444444'; arrowDownM.style.color = '#444444';
      textTime1.style.color = '#444444'; arrowBoxT1.style.color = '#444444';
      textTime2.style.color = '#444444'; arrowBoxT2.style.color = '#444444';
      arrowUpZ1.style.color = '#444444'; arrowDownZ1.style.color = '#444444';
      arrowUpZ2.style.color = '#444444'; arrowDownZ2.style.color = '#444444';
      return;
    }

    if (megaActive) {
      temp1.style.color = '#444444'; temp2.style.color = '#444444';
      arrowUpZ1.style.color = '#444444'; arrowDownZ1.style.color = '#444444';
      arrowUpZ2.style.color = '#444444'; arrowDownZ2.style.color = '#444444';
      tempM.style.color = '#9cff9c'; arrowUpM.style.color = '#9cff9c'; arrowDownM.style.color = '#9cff9c';
      textTime2.style.color = '#444444'; arrowBoxT2.style.color = '#444444';
      textTime1.style.color = '#ffcf7a'; arrowBoxT1.style.color = '#ffcf7a';
    } else {
      tempM.style.color = '#444444'; arrowUpM.style.color = '#444444'; arrowDownM.style.color = '#444444';
      temp1.style.color = zone1Active ? '#9cff9c' : '#444444';
      arrowUpZ1.style.color = zone1Active ? '#9cff9c' : '#444444';
      arrowDownZ1.style.color = zone1Active ? '#9cff9c' : '#444444';
      textTime1.style.color = zone1Active ? '#ffcf7a' : '#444444';
      arrowBoxT1.style.color = zone1Active ? '#ffcf7a' : '#444444';
      temp2.style.color = zone2Active ? '#9cff9c' : '#444444';
      arrowUpZ2.style.color = zone2Active ? '#9cff9c' : '#444444';
      arrowDownZ2.style.color = zone2Active ? '#9cff9c' : '#444444';
      textTime2.style.color = zone2Active ? '#ffcf7a' : '#444444';
      arrowBoxT2.style.color = zone2Active ? '#ffcf7a' : '#444444';
    }
  }

  document.querySelectorAll('.section').forEach(el => {
    el.addEventListener('click', () => {
      const wasActive = el.classList.contains('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      if (!wasActive) el.classList.add('active');
      updateZoneColors();
      updateKnobDisplay();
    });
  });

  $('up-z1').addEventListener('click', e => { e.stopPropagation(); if ($('z1').classList.contains('active') && tempZ1 < 450) { tempZ1 += 5; $('val-temp-z1').textContent = tempZ1; } });
  $('down-z1').addEventListener('click', e => { e.stopPropagation(); if ($('z1').classList.contains('active') && tempZ1 > 105) { tempZ1 -= 5; $('val-temp-z1').textContent = tempZ1; } });

  $('up-z2').addEventListener('click', e => { e.stopPropagation(); if ($('z2').classList.contains('active') && tempZ2 < 450) { tempZ2 += 5; $('val-temp-z2').textContent = tempZ2; } });
  $('down-z2').addEventListener('click', e => { e.stopPropagation(); if ($('z2').classList.contains('active') && tempZ2 > 105) { tempZ2 -= 5; $('val-temp-z2').textContent = tempZ2; } });

  $('up-mega').addEventListener('click', e => {
    e.stopPropagation();
    if ($('mega').classList.contains('active') && tempMega < 450) {
      tempMega += 5; $('val-temp-mega').textContent = tempMega;
      tempZ1 = tempMega; tempZ2 = tempMega;
      $('val-temp-z1').textContent = tempZ1; $('val-temp-z2').textContent = tempZ2;
    }
  });
  $('down-mega').addEventListener('click', e => {
    e.stopPropagation();
    if ($('mega').classList.contains('active') && tempMega > 105) {
      tempMega -= 5; $('val-temp-mega').textContent = tempMega;
      tempZ1 = tempMega; tempZ2 = tempMega;
      $('val-temp-z1').textContent = tempZ1; $('val-temp-z2').textContent = tempZ2;
    }
  });

  $('up-time-z1').addEventListener('click', e => {
    e.stopPropagation();
    if (($('z1').classList.contains('active') || $('mega').classList.contains('active')) && timeZ1 < 60) {
      timeZ1 += 1; $('val-time-z1').textContent = timeZ1;
      if ($('mega').classList.contains('active')) { timeZ2 = timeZ1; $('val-time-z2').textContent = timeZ2; }
    }
  });
  $('down-time-z1').addEventListener('click', e => {
    e.stopPropagation();
    if (($('z1').classList.contains('active') || $('mega').classList.contains('active')) && timeZ1 > 1) {
      timeZ1 -= 1; $('val-time-z1').textContent = timeZ1;
      if ($('mega').classList.contains('active')) { timeZ2 = timeZ1; $('val-time-z2').textContent = timeZ2; }
    }
  });

  $('up-time-z2').addEventListener('click', e => { e.stopPropagation(); if ($('z2').classList.contains('active') && timeZ2 < 60) { timeZ2 += 1; $('val-time-z2').textContent = timeZ2; } });
  $('down-time-z2').addEventListener('click', e => { e.stopPropagation(); if ($('z2').classList.contains('active') && timeZ2 > 1) { timeZ2 -= 1; $('val-time-z2').textContent = timeZ2; } });

  document.querySelectorAll('.knob-option').forEach(el => {
    el.addEventListener('click', () => {
      const zone1Active = $('z1').classList.contains('active');
      const zone2Active = $('z2').classList.contains('active');
      const megaActive = $('mega').classList.contains('active');

      if (!zone1Active && !zone2Active && !megaActive) {
        alert("Sélectionne d'abord Zone 1, Zone 2 ou Megazone en bas pour choisir un mode.");
        return;
      }

      const angle = el.getAttribute('data-angle');
      const alreadySelected = el.classList.contains('active');
      const newAngle = alreadySelected ? null : angle;

      if (megaActive) {
        modeZ1 = newAngle; modeZ2 = newAngle;
      } else {
        if (zone1Active) modeZ1 = newAngle;
        if (zone2Active) modeZ2 = newAngle;
      }

      updateKnobDisplay();
      updateModeLabels();
    });
  });

  $('arrow').addEventListener('click', () => { $('rect3').style.display = $('rect3').style.display === "block" ? "none" : "block"; $('arrow').classList.toggle("open"); });
  $('openPopup').addEventListener('click', () => $('popup').style.display = "block");
  $('cancelPopup').addEventListener('click', () => { $('popup').style.display = "none"; $('recipeName').value = ""; });

  function applyRecipe(name, config) {
    tempZ1 = config.t1; tempZ2 = config.t2; tempMega = (config.tm !== undefined ? config.tm : tempMega);
    timeZ1 = config.ti1; timeZ2 = config.ti2;
    $('val-temp-z1').textContent = tempZ1;
    $('val-temp-z2').textContent = tempZ2;
    $('val-temp-mega').textContent = tempMega;
    $('val-time-z1').textContent = timeZ1;
    $('val-time-z2').textContent = timeZ2;

    ['z1', 'z2', 'mega'].forEach(id => $(id).classList.remove('active'));
    if (config.zones) config.zones.forEach(id => $(id).classList.add('active'));
    updateZoneColors();

    // Modes par zone (compatible avec les anciennes recettes qui n'avaient qu'un seul "knobAngle")
    if (config.modeZ1 !== undefined || config.modeZ2 !== undefined) {
      modeZ1 = config.modeZ1 !== undefined ? config.modeZ1 : null;
      modeZ2 = config.modeZ2 !== undefined ? config.modeZ2 : null;
    } else if (config.knobAngle !== undefined) {
      modeZ1 = config.knobAngle;
      modeZ2 = config.knobAngle;
    } else {
      modeZ1 = null; modeZ2 = null;
    }
    updateKnobDisplay();
    updateModeLabels();

    disp.textContent = name;
  }

  function makeLi(name) {
    const li = document.createElement('li');
    li.textContent = name;
    li.style.cursor = "pointer";
    li.onclick = () => {
      const config = JSON.parse(localStorage.getItem(name));
      applyRecipe(name, config);
      document.querySelectorAll('#recipeList li').forEach(l => l.classList.remove('selected-recipe'));
      li.classList.add('selected-recipe');
    };
    return li;
  }

  $('confirmSave').addEventListener('click', () => {
    const name = $('recipeName').value.trim();
    if (!name) { alert("Nom de recette requis."); return; }

    const activeZones = ['z1', 'z2', 'mega'].filter(id => $(id).classList.contains('active'));

    const config = {
      t1: tempZ1, t2: tempZ2, tm: tempMega,
      ti1: timeZ1, ti2: timeZ2,
      zones: activeZones,
      modeZ1: modeZ1,
      modeZ2: modeZ2
    };

    const isNew = localStorage.getItem(name) === null;
    localStorage.setItem(name, JSON.stringify(config));

    $('popup').style.display = "none";
    $('recipeName').value = "";

    if (isNew) {
      $('recipeList').appendChild(makeLi(name));
    }

    disp.textContent = "Enregistré : " + name;
  });

  $('deleteRecipe').addEventListener('click', () => {
    const sel = document.querySelector('.selected-recipe');
    if (sel) { $('confirmDeletePopup').style.display = "block"; }
    else { alert("Aucune recette sélectionnée."); }
  });
  $('yesDelete').addEventListener('click', () => {
    const sel = document.querySelector('.selected-recipe');
    if (sel) { localStorage.removeItem(sel.textContent); sel.remove(); }
    disp.textContent = "Aucune recette sélectionnée";

    // Remettre toutes les valeurs à leur état d'origine
    tempZ1 = 375; tempZ2 = 375; tempMega = 375;
    timeZ1 = 20; timeZ2 = 20;
    $('val-temp-z1').textContent = tempZ1;
    $('val-temp-z2').textContent = tempZ2;
    $('val-temp-mega').textContent = tempMega;
    $('val-time-z1').textContent = timeZ1;
    $('val-time-z2').textContent = timeZ2;

    // Éteindre les zones actives
    ['z1', 'z2', 'mega'].forEach(id => $(id).classList.remove('active'));
    updateZoneColors();

    // Réinitialiser les modes par zone et le bouton rotatif
    modeZ1 = null; modeZ2 = null;
    updateModeLabels();
    updateKnobDisplay();

    $('confirmDeletePopup').style.display = "none";
  });
  $('noDelete').addEventListener('click', () => $('confirmDeletePopup').style.display = "none");

  // Chargement des recettes déjà enregistrées au démarrage
  const liste = $('recipeList');
  for (let i = 0; i < localStorage.length; i++) {
    const nom = localStorage.key(i);
    liste.appendChild(makeLi(nom));
  }
</script>

</body>
</html>
